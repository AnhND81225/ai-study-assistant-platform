services:
  postgres:
    image: postgres:16-alpine
    container_name: studyai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eduaidb}
      POSTGRES_USER: ${POSTGRES_USER:-eduaidb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduaidb_user} -d ${POSTGRES_DB:-eduaidb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: studyai-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/eduaidb}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-eduaidb_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change_me}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret_at_least_32_characters}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-45}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-700}
      AI_EXPLAIN_LIMIT_PER_USER: ${AI_EXPLAIN_LIMIT_PER_USER:-10}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: studyai-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "5173:5173"

volumes:
  postgres-data:
