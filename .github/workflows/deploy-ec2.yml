name: Deploy Backend to EC2

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-ec2.yml"

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

jobs:
  deploy-backend:
    name: Deploy backend container
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2 through SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            cd ~/ai-study-assistant-platform

            git fetch origin main
            git reset --hard origin/main

            docker build -t studyai-backend ./backend

            docker stop studyai-backend || true
            docker rm studyai-backend || true

            docker run -d \
              --name studyai-backend \
              --env-file backend/.env \
              -p 8080:8080 \
              studyai-backend

            for attempt in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/healthz; then
                echo "Backend is healthy after deploy."
                exit 0
              fi

              echo "Waiting for backend health check (${attempt}/30)..."
              sleep 3
            done

            echo "Backend failed health check after deploy."
            docker logs --tail=120 studyai-backend || true
            exit 1
