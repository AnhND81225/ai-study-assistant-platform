spring:
  application:
    name: edu-ai-platform
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/eduaidb}
    username: ${DATABASE_USERNAME:eduaidb_user}
    password: ${DATABASE_PASSWORD:change_me}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:900000}
      keepalive-time: ${DB_KEEPALIVE_TIME_MS:120000}
      data-source-properties:
        connectTimeout: ${DB_CONNECT_TIMEOUT_SECONDS:10}
        socketTimeout: ${DB_SOCKET_TIMEOUT_SECONDS:60}
        tcpKeepAlive: true
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE_MB:5}MB
      max-request-size: ${MAX_UPLOAD_SIZE_MB:5}MB

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change_this_to_a_long_random_secret_at_least_32_characters}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  upload:
    max-size-mb: ${MAX_UPLOAD_SIZE_MB:5}
  ai:
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${OPENAI_MODEL:gpt-4o-mini}
    timeout-seconds: ${AI_TIMEOUT_SECONDS:45}
    max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:700}
    explain-limit-per-user: ${AI_EXPLAIN_LIMIT_PER_USER:10}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
